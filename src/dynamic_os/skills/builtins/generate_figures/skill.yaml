id: generate_figures
name: Generate Figures
version: 2.0.0
applicable_roles:
  - analyst
description: Generate publication-quality figures from analysis artifacts using template renderers (matplotlib, networkx, mermaid-cli).
input_contract:
  required: []
  requires_any:
    - ExperimentResults
    - ExperimentAnalysis
    - MethodComparison
    - TrendAnalysis
  optional:
    - ExperimentResults
    - ExperimentAnalysis
    - MethodComparison
    - TrendAnalysis
    - EvidenceMap
    - SourceSet
output_artifacts:
  - FigureSet
allowed_tools:
  - mcp.llm.chat
permissions:
  filesystem_write: true
timeout_sec: 180
