- id: conductor
  description: Decompose work, organize context, define handoff goals
  system_prompt: Plan and organize the next research step without drafting the final report.
  default_allowed_skills:
    - plan_research
  input_artifact_types: []
  output_artifact_types:
    - TopicBrief
    - SearchPlan
  forbidden:
    - Must not replace writer and write the final report

- id: researcher
  description: Search, collect, read, and structure research materials
  system_prompt: Gather and structure high-signal research materials without acting as the final writer.
  default_allowed_skills:
    - search_papers
    - fetch_fulltext
    - extract_notes
    - build_evidence_map
    - analyze_trends
  input_artifact_types:
    - TopicBrief
    - SearchPlan
  output_artifact_types:
    - SourceSet
    - PaperNotes
    - EvidenceMap
    - GapMap
    - TrendAnalysis
  forbidden:
    - Must not act as the final writer

- id: experimenter
  description: Design and execute experiment-related skills
  system_prompt: Design and run bounded experiments without taking over literature review work.
  default_allowed_skills:
    - design_experiment
    - run_experiment
    - optimize_skill
    - create_skill
  input_artifact_types:
    - SearchPlan
    - EvidenceMap
    - GapMap
    - ExperimentIteration
    - ReflectionReport
  output_artifact_types:
    - ExperimentPlan
    - ExperimentResults
    - SkillPatch
    - SkillCreation
  forbidden:
    - Must not take over the general literature review flow

- id: analyst
  description: Analyze results, compare evidence, interpret results
  system_prompt: Analyze existing outputs and evidence without making global workflow decisions.
  default_allowed_skills:
    - analyze_metrics
    - build_evidence_map
    - optimize_experiment
    - analyze_trends
    - compare_methods
    - generate_figures
    - reflect_on_failure
  input_artifact_types:
    - SourceSet
    - PaperNotes
    - ExperimentResults
  output_artifact_types:
    - ExperimentAnalysis
    - PerformanceMetrics
    - EvidenceMap
    - ExperimentIteration
    - TrendAnalysis
    - MethodComparison
    - FigureSet
    - ReflectionReport
  forbidden:
    - Must not own global workflow decisions

- id: writer
  description: Produce final deliverables from existing outputs
  system_prompt: Draft final deliverables from existing artifacts without redoing upstream research.
  default_allowed_skills:
    - draft_report
  input_artifact_types:
    - EvidenceMap
    - ExperimentAnalysis
    - PerformanceMetrics
    - ReviewVerdict
    - UserGuidance
    - TrendAnalysis
    - MethodComparison
    - FigureSet
  output_artifact_types:
    - ResearchReport
  forbidden:
    - Must not secretly redo upstream research

- id: reviewer
  description: Review artifacts, identify issues, provide verdicts
  system_prompt: Review artifacts and report issues without directly rewriting the artifact.
  default_allowed_skills:
    - review_artifact
  input_artifact_types:
    - SourceSet
    - ExperimentPlan
    - ResearchReport
  output_artifact_types:
    - ReviewVerdict
  forbidden:
    - Must not directly rewrite artifacts

- id: hitl
  description: Pause execution and request human guidance
  system_prompt: This is a human-in-the-loop pause node. Execution pauses until the human provides a response.
  default_allowed_skills:
    - hitl
  input_artifact_types: []
  output_artifact_types:
    - UserGuidance
  forbidden: []

