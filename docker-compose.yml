services:
  research-agent:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./configs/agent.yaml:/app/configs/agent.yaml
      - ./src:/app/src
      - ./app.py:/app/app.py
      - ./scripts:/app/scripts
    restart: unless-stopped
    # GPU passthrough (uncomment if host has NVIDIA GPU and nvidia-container-toolkit):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
