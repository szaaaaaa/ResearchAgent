providers:
  llm:
    backend: openrouter_chat
    retries: 3
    retry_backoff_sec: 2
    gemini_api_key_env: GEMINI_API_KEY
  search:
    backend: default_search
    web_order:
    - google_cse
    - bing
    query_all_web: false
    circuit_breaker:
      enabled: true
      failure_threshold: 5
      open_ttl_sec: 60
      half_open_probe_after_sec: 30
      sqlite_path: ${project.data_dir}/circuit_breaker.db
  retrieval:
    backend: default_retriever
mcp:
  servers:
  - server_id: llm
    command:
    - ${python}
    - ${workspace_root}/scripts/dynamic_os_mcp_server.py
    - --root
    - ${workspace_root}
    - --server-id
    - llm
  - server_id: search
    command:
    - ${python}
    - ${workspace_root}/scripts/dynamic_os_mcp_server.py
    - --root
    - ${workspace_root}
    - --server-id
    - search
  - server_id: retrieval
    command:
    - ${python}
    - ${workspace_root}/scripts/dynamic_os_mcp_server.py
    - --root
    - ${workspace_root}
    - --server-id
    - retrieval
  - server_id: exec
    command:
    - ${python}
    - ${workspace_root}/scripts/dynamic_os_mcp_server.py
    - --root
    - ${workspace_root}
    - --server-id
    - exec
  - server_id: paper_search
    command:
    - uvx
    - paper-search-mcp
    default_capability: search
    env:
      PAPER_SEARCH_MCP_UNPAYWALL_EMAIL: ''
      PAPER_SEARCH_MCP_CORE_API_KEY: ''
      PAPER_SEARCH_MCP_SEMANTIC_SCHOLAR_API_KEY: ''
      PAPER_SEARCH_MCP_ZENODO_ACCESS_TOKEN: ''
      PAPER_SEARCH_MCP_DOAJ_API_KEY: ''
      PAPER_SEARCH_MCP_GOOGLE_SCHOLAR_PROXY_URL: ''
      PAPER_SEARCH_MCP_IEEE_API_KEY: ''
      PAPER_SEARCH_MCP_ACM_API_KEY: ''
llm:
  provider: openrouter
  model: google/gemini-2.0-flash-001
  temperature: 0.2
  openai_codex:
    transport: auto
    model_discovery: account_plus_cached
  role_models:
    conductor:
      provider: openrouter
      model: google/gemini-2.0-flash-001
    researcher:
      provider: openrouter
      model: google/gemini-3-pro-preview
    experimenter:
      provider: openrouter
      model: google/gemini-2.0-flash-001
    analyst:
      provider: openrouter
      model: google/gemini-3-pro-preview
    writer:
      provider: openrouter
      model: openai/gpt-5.4
    reviewer:
      provider: openrouter
      model: google/gemini-3-pro-preview
auth:
  openai_codex:
    default_profile: default
    allowed_profiles:
    - default
    locked: true
    require_explicit_switch: true
retrieval:
  openai_api_key_env: OPENAI_API_KEY
  runtime_mode: standard
  embedding_backend: openai_embedding
  embedding_model: text-embedding-3-small
  remote_embedding_model: text-embedding-3-small
  hybrid: true
  top_k: 10
  candidate_k: 50
  reranker_backend: local_crossencoder
  reranker_model: cross-encoder/ms-marco-MiniLM-L-6-v2
  device: auto
sources:
  arxiv:
    enabled: true
    max_results_per_query: 30
    download_pdf: true
  openalex:
    enabled: false
    max_results_per_query: 20
  google_scholar:
    enabled: false
    max_results_per_query: 20
  semantic_scholar:
    enabled: true
    max_results_per_query: 30
    polite_delay_sec: 1
    max_retries: 3
    retry_backoff_sec: 2
  web:
    enabled: true
    max_results_per_query: 20
  google_cse:
    enabled: false
  bing:
    enabled: false
  github:
    enabled: false
  paper_search_mcp:
    enabled: true
    max_results_per_query: 20
  pdf_download:
    only_allowed_hosts: false
    allowed_hosts:
    - arxiv.org
    - export.arxiv.org
    - openreview.net
    - openaccess.thecvf.com
    - aclanthology.org
    - proceedings.mlr.press
    - jmlr.org
    - ceur-ws.org
    - papers.nips.cc
    - neurips.cc
    forbidden_host_ttl_sec: 86400
index:
  backend: chroma
  persist_dir: ${project.data_dir}/indexes
  collection_name: papers
  web_collection_name: web
  chunk_size: 1000
  overlap: 200
agent:
  seed: 42
  max_iterations: 8
  papers_per_query: 20
  max_queries_per_iteration: 3
  top_k_for_analysis: 10
  language: en
  report_max_sources: 40
  budget:
    max_research_questions: 3
    max_sections: 5
    max_references: 50
  source_ranking:
    core_min_a_ratio: 0.5
    background_max_c: 0
    max_per_venue: 5
  query_rewrite:
    min_per_rq: 1
    max_per_rq: 3
    max_total_queries: 10
  dynamic_retrieval:
    simple_query_academic: true
    simple_query_pdf: true
    simple_query_terms:
    - what is
    - intro
    - introduction
    - guide
    - tutorial
    - vs
    - difference
    - overview
    - best practices
    - compare
    - comparison
    - 是什么
    - 区别
    - 对比
    - 入门
    deep_query_terms:
    - benchmark
    - evaluation
    - privacy
    - governance
    - architecture
    - framework
    - algorithm
    - ablation
    - latency
    - token
    - memory
    - theorem
    - proof
  memory:
    max_findings_for_context: 20
    max_context_chars: 10000
  evidence:
    min_per_rq: 2
    allow_graceful_degrade: true
  claim_alignment:
    enabled: true
    min_rq_relevance: 0.5
    anchor_terms_max: 5
  limits:
    analysis_web_content_max_chars: 20000
  topic_filter:
    min_keyword_hits: 1
    min_anchor_hits: 1
    include_terms: []
    block_terms:
    - hanabi
    - quantum
    - software registries
    - route choice
    - value systems of agents
    - multi-agent deep reinforcement learning with communication
  routing:
    planner_llm:
      provider: openrouter
      model: google/gemini-2.0-flash-001
      temperature: 0.1
  experiment_plan:
    enabled: true
    mode: optimize
    max_iterations: 6
    gpu: cuda
    objective: ''
    exec_timeout_sec: 120
    max_per_rq: 2
    require_human_results: false
    workspace:
      template: builtin
      custom_path: ''
      mutable_files:
      - configs/hparams.yaml
      - models/model.py
      entry_point: train.py
      eval_script: evaluate.py
    recovery:
      max_retries: 3
      refine_after: 3
      pivot_after: 5
    stopping:
      patience: 3
      min_improvement: 0.001
  review:
    score_threshold: 6
    max_rewrite_cycles: 2
    dimension_weights:
      novelty: 1
      soundness: 1
      clarity: 1
      significance: 1
      completeness: 1
ingest:
  text_extraction: auto
  latex:
    download_source: false
    source_dir: ${project.data_dir}/latex
  figure:
    enabled: false
    image_dir: ${project.data_dir}/figures
    min_width: 200
    min_height: 200
    vlm_model: deep-research-pro-preview-12-2025
    vlm_temperature: 0.1
    validation_min_entity_match: 1
fetch:
  source: arxiv
  max_results: 10
  download_pdf: true
  polite_delay_sec: 1
project:
  data_dir: ./data
paths:
  papers_dir: ${project.data_dir}/papers
  metadata_dir: ${project.data_dir}/metadata
  indexes_dir: ${project.data_dir}/indexes
  outputs_dir: ${project.data_dir}/outputs
metadata_store:
  backend: sqlite
  sqlite_path: ${project.data_dir}/metadata.db
budget_guard:
  max_tokens: 1000000
  max_api_calls: 1000
  max_wall_time_sec: 3600
knowledge_graph:
  persistence_mode: sqlite
  sqlite_path: ''
  cross_run_mode: manual
