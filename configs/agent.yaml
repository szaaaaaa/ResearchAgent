# ── Autonomous Research Agent Configuration ──────────────────────────

project:
  data_dir: data

paths:
  papers_dir: ${project.data_dir}/papers
  metadata_dir: ${project.data_dir}/metadata
  indexes_dir: ${project.data_dir}/indexes
  outputs_dir: outputs

fetch:
  source: arxiv
  max_results: 10
  download_pdf: true
  polite_delay_sec: 1.0

metadata_store:
  backend: sqlite
  sqlite_path: ${paths.metadata_dir}/papers.sqlite

index:
  backend: chroma
  persist_dir: ${paths.indexes_dir}/chroma
  collection_name: papers            # Chroma collection for paper PDFs
  web_collection_name: web_sources   # separate collection for web content
  chunk_size: 1200
  overlap: 200

retrieval:
  top_k: 10
  candidate_k: 30
  reranker_model: ""

# ── LLM settings ────────────────────────────────────────────────────
llm:
  model: gpt-4.1-mini
  temperature: 0.3

# ── Agent-specific settings ─────────────────────────────────────────
agent:
  max_iterations: 3           # max plan→fetch→analyze→synthesize loops
  papers_per_query: 5         # papers to fetch per search query (arXiv)
  max_queries_per_iteration: 3 # search queries generated per iteration
  top_k_for_analysis: 8      # chunks retrieved for per-paper analysis
  language: "en"              # report language: en / zh / auto

# ── Multi-source search ─────────────────────────────────────────────
sources:
  arxiv:
    enabled: true
    max_results_per_query: 5
    download_pdf: true

  web:
    enabled: true
    max_results_per_query: 8     # DuckDuckGo results per query
    scrape_pages: true            # fetch full page content
    scrape_max_chars: 30000       # max chars per page
    polite_delay_sec: 0.5

  semantic_scholar:
    enabled: true
    max_results_per_query: 5
