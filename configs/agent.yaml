providers:
  llm:
    backend: openrouter_chat
    retries: 3
    retry_backoff_sec: 2
    gemini_api_key_env: GEMINI_API_KEY
  search:
    backend: default_search
    academic_order:
    - arxiv
    - semantic_scholar
    web_order:
    - google_cse
    - bing
    query_all_academic: false
    query_all_web: false
    circuit_breaker:
      enabled: true
      failure_threshold: 5
      open_ttl_sec: 60
      half_open_probe_after_sec: 30
      sqlite_path: ${project.data_dir}/circuit_breaker.db
  retrieval:
    backend: default_retriever
llm:
  provider: openrouter
  model: google/gemini-2.0-flash-001
  temperature: 0.2
  role_models:
    conductor:
      provider: openrouter
      model: google/gemini-2.0-flash-001
    researcher:
      provider: openrouter
      model: google/gemini-2.0-flash-001
    experimenter:
      provider: openrouter
      model: google/gemini-2.0-flash-001
    analyst:
      provider: openrouter
      model: google/gemini-2.0-flash-001
    writer:
      provider: openrouter
      model: google/gemini-2.0-flash-001
    critic:
      provider: openrouter
      model: google/gemini-2.0-flash-001
retrieval:
  openai_api_key_env: OPENAI_API_KEY
  runtime_mode: lite
  embedding_backend: openai_embedding
  embedding_model: text-embedding-3-small
  remote_embedding_model: text-embedding-3-small
  hybrid: true
  top_k: 10
  candidate_k: 50
  reranker_backend: local_crossencoder
  reranker_model: cross-encoder/ms-marco-MiniLM-L-6-v2
  device: auto
sources:
  arxiv:
    enabled: true
    max_results_per_query: 10
    download_pdf: true
  openalex:
    enabled: false
    max_results_per_query: 10
  google_scholar:
    enabled: false
    max_results_per_query: 10
  semantic_scholar:
    enabled: true
    max_results_per_query: 10
    polite_delay_sec: 1
    max_retries: 3
    retry_backoff_sec: 2
  web:
    enabled: true
    max_results_per_query: 10
  google_cse:
    enabled: false
  bing:
    enabled: false
  github:
    enabled: false
  pdf_download:
    only_allowed_hosts: false
    allowed_hosts:
    - arxiv.org
    - export.arxiv.org
    - openreview.net
    - openaccess.thecvf.com
    - aclanthology.org
    - proceedings.mlr.press
    - jmlr.org
    - ceur-ws.org
    - papers.nips.cc
    - neurips.cc
    forbidden_host_ttl_sec: 86400
index:
  backend: chroma
  persist_dir: ${project.data_dir}/indexes
  collection_name: papers
  web_collection_name: web
  chunk_size: 1000
  overlap: 200
agent:
  seed: 42
  max_iterations: 5
  papers_per_query: 5
  max_queries_per_iteration: 3
  top_k_for_analysis: 10
  language: zh
  report_max_sources: 20
  budget:
    max_research_questions: 3
    max_sections: 5
    max_references: 30
  source_ranking:
    core_min_a_ratio: 0.5
    background_max_c: 0
    max_per_venue: 5
  query_rewrite:
    min_per_rq: 1
    max_per_rq: 3
    max_total_queries: 10
  dynamic_retrieval:
    simple_query_academic: true
    simple_query_pdf: true
    simple_query_terms:
    - what is
    - intro
    - introduction
    - guide
    - tutorial
    - vs
    - difference
    - overview
    - best practices
    - compare
    - comparison
    - 是什么
    - 区别
    - 对比
    - 入门
    deep_query_terms:
    - benchmark
    - evaluation
    - privacy
    - governance
    - architecture
    - framework
    - algorithm
    - ablation
    - latency
    - token
    - memory
    - theorem
    - proof
  memory:
    max_findings_for_context: 20
    max_context_chars: 10000
  evidence:
    min_per_rq: 2
    allow_graceful_degrade: true
  claim_alignment:
    enabled: true
    min_rq_relevance: 0.5
    anchor_terms_max: 5
  limits:
    analysis_web_content_max_chars: 20000
  topic_filter:
    min_keyword_hits: 1
    min_anchor_hits: 1
    include_terms: []
    block_terms:
    - hanabi
    - quantum
    - software registries
    - route choice
    - value systems of agents
    - multi-agent deep reinforcement learning with communication
  experiment_plan:
    enabled: false
    max_per_rq: 2
    require_human_results: false
  checkpointing:
    enabled: true
    backend: sqlite
    sqlite_path: ${project.data_dir}/checkpoints.db
  routing:
    planner_llm:
      provider: openrouter
      model: google/gemini-2.0-flash-001
      temperature: 0.1
  experiment_execution:
    backend: manual
    autoresearch:
      command:
      - python
      - scripts/run_autoresearch_bridge.py
      - --plan
      - '{plan_path}'
      - --output
      - '{output_path}'
      - --topic
      - '{topic}'
      workdir: '{root}'
      agent_provider: codex
      agent_command: ''
      codex_command: codex exec --cd "{workspace}" --prompt-file "{program_path}"
      claude_code_command: powershell -NoProfile -Command "claude --dangerously-skip-permissions
        --cwd '{workspace}' -p (Get-Content -Raw '{program_path}')"
      workspace_dir: ''
      timeout_sec: 7200
  staged_indexing:
    enabled: true
    fast_text_only_until_iteration: 0
    first_pass_text_extraction: pymupdf_only
    figure_enrichment_start_iteration: 1
    figure_top_papers: 4
ingest:
  text_extraction: pymupdf_only
  latex:
    download_source: false
    source_dir: ${project.data_dir}/latex
  figure:
    enabled: false
    image_dir: ${project.data_dir}/figures
    min_width: 200
    min_height: 200
    vlm_model: deep-research-pro-preview-12-2025
    vlm_temperature: 0.1
    validation_min_entity_match: 1
fetch:
  source: arxiv
  max_results: 10
  download_pdf: true
  polite_delay_sec: 1
project:
  data_dir: ./data
paths:
  papers_dir: ${project.data_dir}/papers
  metadata_dir: ${project.data_dir}/metadata
  indexes_dir: ${project.data_dir}/indexes
  outputs_dir: ${project.data_dir}/outputs
metadata_store:
  backend: sqlite
  sqlite_path: ${project.data_dir}/metadata.db
budget_guard:
  max_tokens: 1000000
  max_api_calls: 1000
  max_wall_time_sec: 3600
