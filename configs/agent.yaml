# ── Autonomous Research Agent Configuration ──────────────────────────

project:
  data_dir: data

paths:
  papers_dir: ${project.data_dir}/papers
  metadata_dir: ${project.data_dir}/metadata
  indexes_dir: ${project.data_dir}/indexes
  outputs_dir: outputs

fetch:
  source: arxiv
  max_results: 10
  download_pdf: true
  polite_delay_sec: 1.0

metadata_store:
  backend: sqlite
  sqlite_path: ${paths.metadata_dir}/papers.sqlite

index:
  backend: chroma
  persist_dir: ${paths.indexes_dir}/chroma
  collection_name: papers            # Chroma collection for paper PDFs
  web_collection_name: web_sources   # separate collection for web content
  chunk_size: 1200
  overlap: 200

retrieval:
  top_k: 10
  candidate_k: 30
  reranker_model: "BAAI/bge-reranker-base"

# ── LLM settings ────────────────────────────────────────────────────
llm:
  model: gpt-5.2
  temperature: 0.3

providers:
  llm:
    backend: openai_chat
    retries: 1
    retry_backoff_sec: 1.0
  search:
    backend: default_search
    academic_order: [google_scholar, semantic_scholar]
    web_order: [google, duckduckgo]
    query_all_academic: false
    query_all_web: false
  retrieval:
    backend: default_retriever

# ── Agent-specific settings ─────────────────────────────────────────
agent:
  seed: 42
  max_iterations: 1           # max plan→fetch→analyze→synthesize loops
  papers_per_query: 5         # papers to fetch per search query (arXiv)
  max_queries_per_iteration: 3 # search queries generated per iteration
  top_k_for_analysis: 8      # chunks retrieved for per-paper analysis
  language: "en"              # report language: en / zh / auto
  report_max_sources: 40      # max deduplicated references in final report
  budget:
    max_research_questions: 3
    max_sections: 5
    max_references: 20
  source_ranking:
    core_min_a_ratio: 0.7
    background_max_c: 3
  dynamic_retrieval:
    simple_query_academic: false
    simple_query_pdf: false
    simple_query_terms:
      - what is
      - intro
      - introduction
      - guide
      - tutorial
      - vs
      - difference
      - overview
      - best practices
      - compare
      - comparison
      - 是什么
      - 区别
      - 对比
      - 入门
    deep_query_terms:
      - benchmark
      - evaluation
      - privacy
      - governance
      - architecture
      - framework
      - algorithm
      - ablation
      - latency
      - token
      - memory
      - theorem
      - proof
  memory:
    max_findings_for_context: 20
    max_context_chars: 3500
  limits:
    analysis_web_content_max_chars: 15000
  topic_filter:
    min_keyword_hits: 1
    include_terms: []
    block_terms:
      - hanabi
      - quantum
      - software registries
      - route choice
      - value systems of agents
      - multi-agent deep reinforcement learning with communication

# ── Multi-source search ─────────────────────────────────────────────
sources:
  arxiv:
    enabled: true
    max_results_per_query: 5
    download_pdf: true

  google_scholar:
    enabled: true
    max_results_per_query: 5

  web:
    enabled: true
    max_results_per_query: 8
    overfetch_factor: 3           # fetch more, then rerank/filter down
    prefer_google: true           # use Google (SerpAPI) before DDG when available
    google_hl: en
    google_gl: us
    ddg_region: us-en
    prefer_english: true          # rank English/global sources first
    max_chinese_ratio: 0.25       # Chinese sources are fallback quota
    blocked_domains: []           # e.g. ["zhidao.baidu.com"]
    scrape_pages: true            # fetch full page content
    scrape_max_chars: 30000       # max chars per page
    polite_delay_sec: 0.5

  semantic_scholar:
    enabled: true
    max_results_per_query: 5

budget_guard:
  max_tokens: 500000
  max_api_calls: 200
  max_wall_time_sec: 600
