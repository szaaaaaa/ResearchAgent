providers:
  llm:
    backend: openai_chat
    retries: 1
    retry_backoff_sec: 1
    gemini_api_key_env: GEMINI_API_KEY
  search:
    backend: hybrid
    academic_order:
    - openalex
    - semantic_scholar
    - google_scholar
    web_order:
    - duckduckgo
    query_all_academic: false
    query_all_web: false
    circuit_breaker:
      enabled: true
      failure_threshold: 5
      open_ttl_sec: 60
      half_open_probe_after_sec: 30
      sqlite_path: ${project.data_dir}/circuit_breaker.db
  retrieval:
    backend: default_retriever
llm:
  provider: openai
  model: gpt-4-turbo
  temperature: 0.3
  role_models:
    conductor:
      provider: openai
      model: gpt-5.4
    researcher:
      provider: gemini
      model: gemini-3-pro-preview
    critic:
      provider: openai
      model: gpt-5.4
retrieval:
  openai_api_key_env: OPENAI_API_KEY
  runtime_mode: standard
  embedding_backend: local_st
  embedding_model: BAAI/bge-m3
  remote_embedding_model: text-embedding-3-small
  hybrid: true
  top_k: 10
  candidate_k: 30
  reranker_backend: local_crossencoder
  reranker_model: BAAI/bge-reranker-v2-m3
  device: auto
sources:
  arxiv:
    enabled: true
    max_results_per_query: 6
    download_pdf: true
  openalex:
    enabled: true
    max_results_per_query: 6
  google_scholar:
    enabled: false
    max_results_per_query: 8
  semantic_scholar:
    enabled: true
    max_results_per_query: 5
    polite_delay_sec: 3
    max_retries: 1
    retry_backoff_sec: 1.5
  web:
    enabled: false
    max_results_per_query: 8
    overfetch_factor: 3
    prefer_google: false
    google_hl: en
    google_gl: us
    bing_mkt: en-US
    github_sort: stars
    ddg_region: us-en
    prefer_english: true
    max_chinese_ratio: 0.25
    blocked_domains: []
    scrape_pages: true
    scrape_max_chars: 30000
    polite_delay_sec: 0.5
  google_cse:
    enabled: false
  bing:
    enabled: false
  github:
    enabled: false
  pdf_download:
    only_allowed_hosts: true
    allowed_hosts:
    - arxiv.org
    - export.arxiv.org
    - openreview.net
    - openaccess.thecvf.com
    - aclanthology.org
    - proceedings.mlr.press
    - jmlr.org
    - ceur-ws.org
    - papers.nips.cc
    - neurips.cc
    forbidden_host_ttl_sec: 1800
index:
  backend: chroma
  persist_dir: ${paths.indexes_dir}/chroma
  collection_name: papers
  web_collection_name: web_sources
  chunk_size: 1200
  overlap: 200
agent:
  seed: 42
  max_iterations: 3
  papers_per_query: 5
  max_queries_per_iteration: 3
  top_k_for_analysis: 12
  language: en
  report_max_sources: 80
  budget:
    max_research_questions: 3
    max_sections: 7
    max_references: 60
  source_ranking:
    core_min_a_ratio: 0.9
    background_max_c: 0
    max_per_venue: 2
  query_rewrite:
    min_per_rq: 6
    max_per_rq: 8
    max_total_queries: 8
  dynamic_retrieval:
    simple_query_academic: true
    simple_query_pdf: true
    simple_query_terms:
    - what is
    - intro
    - introduction
    - guide
    - tutorial
    - vs
    - difference
    - overview
    - best practices
    - compare
    - comparison
    - 是什么
    - 区别
    - 对比
    - 入门
    deep_query_terms:
    - benchmark
    - evaluation
    - privacy
    - governance
    - architecture
    - framework
    - algorithm
    - ablation
    - latency
    - token
    - memory
    - theorem
    - proof
  memory:
    max_findings_for_context: 40
    max_context_chars: 7000
  evidence:
    min_per_rq: 2
    allow_graceful_degrade: true
  claim_alignment:
    enabled: true
    min_rq_relevance: 0.2
    anchor_terms_max: 4
  limits:
    analysis_web_content_max_chars: 15000
  topic_filter:
    min_keyword_hits: 2
    min_anchor_hits: 1
    include_terms: []
    block_terms:
    - hanabi
    - quantum
    - software registries
    - route choice
    - value systems of agents
    - multi-agent deep reinforcement learning with communication
  experiment_plan:
    enabled: false
    max_per_rq: 2
    require_human_results: false
  checkpointing:
    enabled: true
    backend: sqlite
    sqlite_path: ${project.data_dir}/checkpoints.db
  staged_indexing:
    enabled: true
    fast_text_only_until_iteration: 0
    first_pass_text_extraction: pymupdf_only
    figure_enrichment_start_iteration: 1
    figure_top_papers: 4
ingest:
  text_extraction: latex_first
  latex:
    download_source: true
    source_dir: ${project.data_dir}/sources
  figure:
    enabled: true
    image_dir: ${project.data_dir}/figures
    min_width: 100
    min_height: 100
    vlm_model: gpt-4o
    vlm_temperature: 0.1
    validation_min_entity_match: 0.5
fetch:
  source: arxiv
  max_results: 10
  download_pdf: true
  polite_delay_sec: 1
project:
  data_dir: ./data
paths:
  papers_dir: ${project.data_dir}/papers
  metadata_dir: ${project.data_dir}/metadata
  indexes_dir: ${project.data_dir}/indexes
  outputs_dir: outputs
metadata_store:
  backend: sqlite
  sqlite_path: ${paths.metadata_dir}/papers.sqlite
budget_guard:
  max_tokens: 5000000
  max_api_calls: 1500
  max_wall_time_sec: 7200
