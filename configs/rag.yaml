project:
  data_dir: data

paths:
  papers_dir: ${project.data_dir}/papers
  metadata_dir: ${project.data_dir}/metadata
  indexes_dir: ${project.data_dir}/indexes
  outputs_dir: outputs
ingest:
  text_extraction: auto
  latex:
    download_source: true
    source_dir: ${project.data_dir}/sources
  figure:
    enabled: true
    image_dir: ${project.data_dir}/figures
    min_width: 100
    min_height: 100
    vlm_model: gemini-2.5-flash
    vlm_temperature: 0.1
    validation_min_entity_match: 0.5

fetch:
  source: arxiv
  max_results: 20
  download_pdf: true
  polite_delay_sec: 1.0
  user_agent: "auto-research-agent/0.1"

metadata_store:
  backend: sqlite
  sqlite_path: ${paths.metadata_dir}/papers.sqlite

index:
  backend: chroma
  persist_dir: ${paths.indexes_dir}/chroma

retrieval:
  embedding_model: BAAI/bge-m3        # or all-MiniLM-L6-v2
  hybrid: true                         # BM25 + dense RRF fusion
  top_k: 10
  candidate_k: 30
  reranker_model: BAAI/bge-reranker-v2-m3

openai:
  model: gpt-4.1-mini
  temperature: 0.2
