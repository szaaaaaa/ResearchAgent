name: CI

on:
  push:
  pull_request:

jobs:
  core-ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install
        run: |
          python -m pip install -U pip
          pip install -e . --no-deps
          pip install pytest pyyaml requests pydantic fastapi websocket-client httpx uvicorn

      - name: Dynamic OS Tests
        run: |
          pytest -q \
            tests/test_dynamic_os_phase1.py \
            tests/test_dynamic_os_phase2.py \
            tests/test_dynamic_os_phase3.py \
            -p no:cacheprovider
